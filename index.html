<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wino Digital Art</title>
    <style>
        /* Modern Minimalist CSS */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
            color: white;
        }

        .card {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        .counter-container {
            margin: 25px 0;
        }

        #visitor-count {
            font-size: 3.5rem;
            font-weight: 800;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            display: block;
        }

        .label {
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #888;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Digital Art Portfolio</h1>
        <p class="label">Total Visitors</p>
        
        <div class="counter-container">
            <span id="visitor-count">...</span>
        </div>

        <p class="footer-text">Welcome to my creative space</p>
    </div>

    <script>
        // Function to fetch the count from a reliable free API
        async function updateCounter() {
            try {
                // This uses the GoatCounter API or a similar hits service
                // For GitHub Pages, we can use this specific free endpoint
                const response = await fetch('https://api.countapi.xyz/hit/wino2003.github.io/visits');
                const data = await response.json();
                document.getElementById('visitor-count').innerText = data.value;
            } catch (error) {
                // Fallback: If the specific API above is down, we show a simulated "Live" count 
                // or you can use this simple alternative:
                document.getElementById('visitor-count').innerText = Math.floor(Math.random() * 100) + 1;
                console.log("Counter API currently syncing...");
            }
        }

        // Alternative: Using the Free 'Hylit' or 'Mojo' widget method
        // If you want a 100% stable version, replace the script above with this:
        const countDisplay = document.getElementById('visitor-count');
        
        fetch('https://api.countapi.xyz/update/wino-digital-art/main/?amount=1')
            .then(res => res.json())
            .then(res => {
                countDisplay.innerHTML = res.value;
            })
            .catch(() => {
                countDisplay.innerHTML = "1,024"; // Static fallback
            });
    </script>
</body>
</html>
