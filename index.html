<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wino Digital Art | Portfolio</title>
    <style>
        /* Modern Glassmorphism Design */
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #0f172a; /* Deep dark blue */
            color: #ffffff;
        }

        .card {
            text-align: center;
            background: rgba(30, 41, 59, 0.7);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 320px;
            width: 90%;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 1.4rem;
            color: #38bdf8; /* Bright Cyan */
            letter-spacing: 1px;
        }

        .counter-container {
            margin: 30px 0;
            padding: 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
        }

        #visitor-count {
            font-size: 3.5rem;
            font-weight: 800;
            color: #f8fafc;
            display: block;
            line-height: 1;
        }

        .label {
            font-size: 0.7rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            display: block;
        }

        .footer-note {
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Digital Art</h1>
        
        <div class="counter-container">
            <span id="visitor-count">...</span>
            <span class="label">Total Views</span>
        </div>

        <p class="footer-note">wino2003.github.io</p>
    </div>

    <script>
        // Use a different, more stable API (CounterAPI.dev)
        // This key is unique to your digitalart project
        const namespace = "wino2003-digitalart";
        const key = "main-page";

        async function updateCounter() {
            try {
                const response = await fetch(`https://api.counterapi.dev/v1/${namespace}/${key}/up`);
                const data = await response.json();
                
                if (data.count) {
                    document.getElementById('visitor-count').innerText = data.count.toLocaleString();
                }
            } catch (error) {
                // If the API fails, we show a default number so the UI isn't empty
                document.getElementById('visitor-count').innerText = "1";
                console.error("Counter update failed, using fallback.");
            }
        }

        updateCounter();
    </script>
</body>
</html>
