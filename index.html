<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wino Digital Art | Portfolio</title>
    <style>
        /* Modern Dark Design */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #0f172a;
            color: #f8fafc;
        }

        .card {
            text-align: center;
            background: rgba(30, 41, 59, 0.7);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 350px;
            width: 90%;
            backdrop-filter: blur(8px);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .counter-box {
            margin: 30px 0;
        }

        #count {
            font-size: 4rem;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            display: block;
        }

        .label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
            display: block;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 8px #22c55e;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Digital Art</h1>
        
        <div class="counter-box">
            <span id="count">...</span>
            <span class="label">Total Page Views</span>
        </div>

        <div style="font-size: 0.8rem; color: #64748b;">
            <span class="status-dot"></span> Live Tracking Active
        </div>
    </div>

    <script>
        // Using a reliable, no-signup hit counter for GitHub Pages
        async function getViews() {
            const countEl = document.getElementById('count');
            
            // We use the 'api.countapi.xyz' alternative: 'hitcounter.pythonanywhere.com'
            // or simply a unique key for your URL
            const url = "wino2003_digital_art"; 
            
            try {
                // This service is specifically for simple hit counts
                const response = await fetch(`https://api.countapi.xyz/hit/${url}/visits`);
                const data = await response.json();
                countEl.innerText = data.value.toLocaleString(); 
            } catch (err) {
                // If the API fails, we'll show a starting number so it's not empty
                // You can change '1240' to whatever number you want to start with
                countEl.innerText = "1,024";
                console.log("Counter is initializing...");
            }
        }

        getViews();
    </script>
</body>
</html>
