<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Site</title>
    <style>
        /* CSS to make it look nice */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        .counter-box {
            font-size: 2.5rem;
            font-weight: bold;
            color: #007bff;
            margin: 20px 0;
        }
        p { color: #666; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>This page has been viewed</p>
        <!-- The count will appear here -->
        <div class="counter-box" id="count">0</div>
        <p>times!</p>
    </div>

    <script>
        // JS to fetch and update the count
        function cb(response) {
            document.getElementById('count').innerText = response.value;
        }

        // We use a public API to track the hits for your specific domain
        // Replace 'your-unique-key' with any unique string (like your website name)
        const script = document.createElement('script');
        script.src = 'https://api.countapi.xyz/hit/your-website-name-123/visits?callback=cb';
        document.body.appendChild(script);
    </script>
    
</body>
</html>
